<!DOCTYPE html>
<html lang="ru">
<head>
  <title>DEMO — ARTICLE — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <style>
    /* STYLES */
  </style>
</head>
<body>
  <script>
    const GITHUB_REPO_API = 'https://api.github.com/repos'
    const REPO = 'doka-guide/content'
    const NEXT_PAGE_PATTERN = /(?<=<)([\S]*)(?=>; rel="Next")/i
    const CO_AUTHORS_PATTERN = /Co-authored-by:\s+([^\n\r]+)/g
    const EMAIL_PATTERN = /^(.+?)\s*<([^>]+)>$/

    function requestData(url){
      try {
        return fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }
        })
      } catch (error) {
        console.error(error);
        return []
      }
    }

    function createQueryStr(year, pageSize = 100) {
      const yearParam = year || new Date().getFullYear()
      const since = `${yearParam}-01-01T00:00:00+03:00`
      const until = `${yearParam}-12-31T23:59:59+03:00`
      const queryParams = new URLSearchParams({
        since,
        until,
        sha: 'main',
        per_page: pageSize
      })
      return queryParams.toString()
    }

    function createCommitsDataURL(year) {
      const queryStr = createQueryStr(year)
      return `${GITHUB_REPO_API}/${REPO}/commits?${queryStr}`
    }

    function getCoAuthors(message) {
      const groups = [ ...message.matchAll(CO_AUTHORS_PATTERN)]
      if (groups.length === 0) return null

      return groups.map(match => match[1])
    }

    function getPageCommits(pageData) {
      return pageData.map(item => {
        const { author, committer, commit } = item
        const { message, author: commitAuthor } = commit

        const common = {
          authorName: commitAuthor.name,
          authorEmail: commitAuthor.email,
          coAuthors: getCoAuthors(message),
          message
        }

        if (author) {
          const { login, id } = author
          const commitDate = commit.author.date
          return {
            ...common,
            dateTime: commitDate,
            authorLogin: login,
            authorId: id,
          }
        } else if (committer){
          console.log('unknown author:', item)
          const commitDate = commit.committer.date

          return {
            ...common,
            dateTime: commitDate,
            committerLogin: committer.login,
            committerId: committer.id,
          }
        } else {
          console.log('unknown author and committer:', item)
        }
      }).filter(Boolean);
    }

    async function fetchCommitsData(year){
      const commits = []

      try {
        let url = createCommitsDataURL(year)
        let pagesRemaining = true

        while(pagesRemaining) {
          const response = await requestData(url)

          if (response.ok) {
            const pageData = await response.json()

            const pageCommits = getPageCommits(pageData)

            commits.push(...pageCommits)

            const linkHeader = response.headers.get('link')
            pagesRemaining = linkHeader && linkHeader.includes(`rel=\"next\"`)

            if (pagesRemaining) {
              url = linkHeader.match(NEXT_PAGE_PATTERN)[0]
            }
          } else {
            pagesRemaining = false
          }
        }
        return commits
      } catch (error) {
        console.error(error)
      }
    }

    function analyzeCommits(commits = []){
      const authorsMap = new Map()
      const coAuthorsMap = new Map()

      const datesMap = commits.reduce((acc, commit, index) => {
        const { dateTime, authorLogin, authorEmail, committerLogin, coAuthors } = commit

        const [ date ] = dateTime.split('T')
        let currentDate = acc.get(date) ?? {
          count: 0,
          authors: new Map(),
          coAuthors: new Map()
        }

        const key = commit.authorId ?? commit.committerId

        const authorData = authorsMap.get(key) ?? {
          login: authorLogin ?? committerLogin,
          email: authorEmail,
          count: 0
        }

        authorData.count++
        authorsMap.set(key, authorData)

        const currentDateAuthor = currentDate.authors.get(authorData.login) ?? {
          count: 0,
          email: authorData.email
        }

        currentDate.count++
        currentDateAuthor.count++
        currentDate.authors.set(authorData.login, currentDateAuthor)

        if (coAuthors) {
          coAuthors.forEach(coAuthorKey => {
            const nameEmailMatch = coAuthorKey.match(EMAIL_PATTERN)
            if (nameEmailMatch) {
              const coAauthorName = nameEmailMatch[1]
              const coAauthorEmail = nameEmailMatch[2]

              const coAauthorData = coAuthorsMap.get(coAauthorEmail) ?? {
                name: coAauthorName,
                count: 0
              }

              coAauthorData.count++
              coAuthorsMap.set(coAauthorEmail, coAauthorData)

              const currentDateCoAauthor = currentDate.coAuthors.get(coAauthorEmail) ?? {
                count: 0,
                name: coAauthorData.name
              }

              currentDateCoAauthor.count++
              currentDate.coAuthors.set(coAauthorEmail, currentDateCoAauthor)
            }
          })
        }

        acc.set(date, currentDate)

        return acc
      }, new Map())

      const dates = Array.from(datesMap.entries()).reduce((acc, item) => {
        const [date, data] = item
        acc.push({ date, ...data })
        return acc
      }, [])

      const authors = Array.from(authorsMap.values()).sort(
        (a, b) => b.count - a.count
      )

      const coAuthors = Array.from(coAuthorsMap.values())

      console.log('commits:', commits);
      console.log('dates:', dates)
      console.log('authors:', authors)
      console.log('coAuthors:', coAuthors)
    }

    fetchCommitsData(2025).then(commits => {
      analyzeCommits(commits)
    })
  </script>
</body>
</html>
