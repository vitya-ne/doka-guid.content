    function requestGitHubData(url){
      try {
        fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }
        })
      } catch (error) {
        console.error(error);
        return []
      }
    }

    function getWeekDate(weekTimestamp) {
      const date = new Date(weekTimestamp * 1000)

      return DATE_FORMATTER.format(date)
    }

    function analyze(data) {
      console.log(':', data);
    }

    function parseCommits(responseData) {
      return responseData.map(item => {
        const { days, total, week } = item

        return {
          days,
          total,
          date: getWeekDate(week)
        }
      })
    }

    function render(data = [], info, parentContainer){
      const columns = data.length
      const yearContainer = document.createElement('div')
      yearContainer.className = "grid"

      data.forEach(weekData => {
        const cell = document.createElement('div')
        cell.className = "week cell"

        const cellBody = document.createElement('div')
        const cellOpacity = weekData.total / info.max
        cellBody.className = "cell-body"
        cellBody.style.opacity = cellOpacity > 1 ? 1 : cellOpacity

        cell.appendChild(cellBody)
        yearContainer.appendChild(cell)
      })

      parentContainer.appendChild(yearContainer)
    }

    function createURL() {
      return `${GITHUB_REPO_API}/${REPO}/stats/commit_activity`
    }

    async function fetchCommitStat(){
      try {
        let url = createURL()

        // const response = await requestGitHubData(url)

        // if (response.ok) {
        //   return await response.json()
        // }
        return Promise.resolve(MOCKUP)

      } catch (error) {
        console.error(error)
      }
    }

    const parentContainer = document.querySelector('#repoCommitsGrid')

    fetchCommitStat().then(responseData => {
      return parseCommits(responseData)
    }).then(data => {
      const info = analyze(data)
      render(data, { max: 50}, parentContainer)
    })
