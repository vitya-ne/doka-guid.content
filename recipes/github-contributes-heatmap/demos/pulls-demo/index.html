  <script>
    const githubRepoApi = 'https://api.github.com/repos'
    const repo = 'doka-guide/content'


    function requestData(url){
      try {
        return fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }
        })
      } catch (error) {
        console.error(error);
        return []
      }
    }

    function createQueryStr(year, pageSize = 100) {
      const queryParams = new URLSearchParams({
        state: 'closed',
        base: 'main',
        per_page: pageSize
      })
      return queryParams.toString()
    }

    function makePullsDataURL(year) {
      const queryStr = createQueryStr(year)
      return `${githubRepoApi}/${repo}/pulls?${queryStr}`
    }

    async function fetchPullsData(year){
      const pulls = []
      const nextPattern = /(?<=<)([\S]*)(?=>; rel="Next")/i

      try {
        let url = makePullsDataURL(year)
        let pagesRemaining = true

        while(pagesRemaining) {
          const response = await requestData(url)

          if (response.ok) {
            const pageData = await response.json()

            // const pageCommits = pageData.map(item => {

            //       committerLogin: committer.login,
            //       committerId: committer.id
            //     }
            //   }
            // }).filter(Boolean)

            pulls.push(...pageData)

            const linkHeader = response.headers.get('link')
            pagesRemaining = linkHeader && linkHeader.includes(`rel=\"next\"`)

            if (pagesRemaining) {
              url = linkHeader.match(nextPattern)[0]
            }
          } else {
            pagesRemaining = false
          }
        }
        return commits
      } catch (error) {
        console.error(error)
      }
    }
